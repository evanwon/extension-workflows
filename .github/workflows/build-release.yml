name: Build and Release (Reusable)

on:
  workflow_call:
    inputs:
      extension-name:
        description: 'Extension name for artifact naming (e.g. fancy-links)'
        type: string
        required: true
      extension-display-name:
        description: 'Display name for release titles (e.g. Fancy Links)'
        type: string
        required: true
      extension-description:
        description: 'One-line description for release notes'
        type: string
        required: true
      manifest-version:
        description: 'Expected manifest_version (2 or 3)'
        type: number
        default: 3
      lint-warnings-as-errors:
        description: 'Pass --warnings-as-errors to web-ext lint'
        type: boolean
        default: false
      validate-tag-matches-manifest:
        description: 'Verify git tag matches manifest version_name'
        type: boolean
        default: true
      amo-submission-enabled:
        description: 'Whether AMO listed submission is enabled (caller passes vars.AMO_SUBMISSION_ENABLED)'
        type: boolean
        default: false
      issues-url:
        description: 'GitHub issues URL for pre-release notes'
        type: string
        required: true
      amo-url:
        description: 'AMO listing URL (empty string to omit from release notes)'
        type: string
        default: ''
      firefox-min-version:
        description: 'Minimum Firefox version for release notes footer'
        type: string
        default: '109+'
      permissions-description:
        description: 'Permissions list for release notes footer'
        type: string
        required: true
      create-release:
        description: 'Create GitHub release (from workflow_dispatch passthrough)'
        type: boolean
        default: false
      submit-to-amo:
        description: 'Submit to AMO (from workflow_dispatch passthrough)'
        type: boolean
        default: false
      channel:
        description: 'AMO channel (from workflow_dispatch passthrough)'
        type: string
        default: 'listed'
      version-notes:
        description: 'Optional AMO submission notes (from workflow_dispatch passthrough)'
        type: string
        default: ''
    secrets:
      AMO_API_KEY:
        required: false
      AMO_API_SECRET:
        required: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        browser: [firefox]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 50

    - name: Fetch tags for changelog generation
      run: git fetch --tags origin

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --ignore-scripts

    - name: Validate version consistency
      run: npx extension-validate-versions

    - name: Security audit
      run: |
        # Hard-fail on production dependency vulnerabilities
        echo "Checking production dependencies..."
        npm audit --omit=dev --audit-level=moderate || {
          echo "::error::Production dependency vulnerabilities found! Run 'npm audit --omit=dev' locally."
          exit 1
        }

        # Warn (but don't fail) on dev-only dependency vulnerabilities
        echo "Checking dev dependencies..."
        npm audit --audit-level=moderate || {
          echo "::warning::Dev dependency vulnerabilities found. Run 'npm audit' locally for details."
          echo "These are in dev/test tooling only and do not affect the shipped extension."
        }

    - name: Run tests with coverage
      run: npm run test:ci

    - name: Install build tools
      run: npm install -g web-ext@latest --ignore-scripts

    - name: Validate manifest
      run: |
        echo "Validating manifest.json for ${{ matrix.browser }}..."
        node -e "
          const manifest = JSON.parse(require('fs').readFileSync('src/manifest.json', 'utf8'));
          console.log('Extension:', manifest.name, 'v' + manifest.version);
          console.log('Target browser: ${{ matrix.browser }}');
          if (!manifest.version) throw new Error('No version in manifest');
          if (manifest.manifest_version !== ${{ inputs.manifest-version }}) {
            throw new Error('Expected Manifest V${{ inputs.manifest-version }} but found V' + manifest.manifest_version);
          }
        "

    - name: Extract version
      id: get_version
      run: |
        if [[ "${{ github.event_name }}" == "push" ]]; then
          # Extract from tag
          echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        else
          # Extract from manifest.json for manual builds
          version=$(node -e "console.log(JSON.parse(require('fs').readFileSync('src/manifest.json', 'utf8')).version)")
          echo "version=$version" >> $GITHUB_OUTPUT
        fi

        # Also extract version_name if present (for pre-release detection)
        version_name=$(node -e "const m = JSON.parse(require('fs').readFileSync('src/manifest.json', 'utf8')); console.log(m.version_name || m.version)")
        echo "version_name=$version_name" >> $GITHUB_OUTPUT

    - name: Verify tag matches manifest
      if: github.event_name == 'push' && inputs.validate-tag-matches-manifest
      run: |
        TAG_VERSION="${GITHUB_REF#refs/tags/v}"
        MANIFEST_VERSION="${{ steps.get_version.outputs.version_name }}"
        if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
          echo "::error::Tag v${TAG_VERSION} does not match manifest version_name (${MANIFEST_VERSION})"
          echo "Run 'npm run version:bump' to ensure tag and manifest are in sync."
          exit 1
        fi
        echo "Tag v${TAG_VERSION} matches manifest version_name"

    - name: Determine release type
      id: release_type
      run: |
        # Check version_name for pre-release indicators
        VERSION_NAME="${{ steps.get_version.outputs.version_name }}"
        VERSION="${{ steps.get_version.outputs.version }}"

        # Check if version_name contains pre-release suffix (rc, beta, alpha)
        if [[ "$VERSION_NAME" =~ -(rc|beta|alpha)[0-9]*$ ]]; then
          echo "is_prerelease=true" >> $GITHUB_OUTPUT
          echo "Pre-release detected: $VERSION_NAME"
        else
          echo "is_prerelease=false" >> $GITHUB_OUTPUT
          echo "Stable release detected: $VERSION"
        fi

    - name: Firefox - Lint extension
      if: matrix.browser == 'firefox'
      run: |
        echo "Firefox: Linting extension with web-ext..."
        if [ "${{ inputs.lint-warnings-as-errors }}" == "true" ]; then
          web-ext lint --source-dir=src --warnings-as-errors
        else
          web-ext lint --source-dir=src
        fi

    - name: Firefox - Build extension
      if: matrix.browser == 'firefox'
      run: |
        echo "Firefox: Building extension with web-ext..."
        web-ext build --source-dir=src --artifacts-dir=dist --overwrite-dest

    - name: Firefox - Determine AMO submission
      if: matrix.browser == 'firefox'
      id: amo_config
      run: |
        # Pre-releases never go to AMO listed channel
        if [[ "${{ steps.release_type.outputs.is_prerelease }}" == "true" ]]; then
          echo "submit=false" >> $GITHUB_OUTPUT
          echo "channel=unlisted" >> $GITHUB_OUTPUT
          echo "Pre-release: Will sign via unlisted channel only"
        elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          # Manual trigger - use provided inputs
          echo "submit=${{ inputs.submit-to-amo }}" >> $GITHUB_OUTPUT
          echo "channel=${{ inputs.channel }}" >> $GITHUB_OUTPUT
        elif [[ "${{ github.event_name }}" == "push" && "${{ inputs.amo-submission-enabled }}" == "true" ]]; then
          # Stable release with AMO enabled
          echo "submit=true" >> $GITHUB_OUTPUT
          echo "channel=listed" >> $GITHUB_OUTPUT
        else
          echo "submit=false" >> $GITHUB_OUTPUT
          echo "channel=unlisted" >> $GITHUB_OUTPUT
        fi

        # Log configuration for debugging
        echo "AMO submission enabled input: ${{ inputs.amo-submission-enabled }}"
        echo "Event type: ${{ github.event_name }}"

    - name: Firefox - Submit to AMO (listed channel)
      if: matrix.browser == 'firefox' && steps.amo_config.outputs.submit == 'true' && steps.amo_config.outputs.channel == 'listed'
      env:
        AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
        AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
      run: |
        # Check if AMO credentials are configured
        if [[ -z "$AMO_API_KEY" || -z "$AMO_API_SECRET" ]]; then
          echo "AMO credentials not configured. Please set AMO_API_KEY and AMO_API_SECRET secrets."
          echo "amo_submitted=false" >> $GITHUB_ENV
          exit 1
        fi

        echo "Firefox: Submitting to AMO for public distribution..."

        # Prepare submission notes
        if [[ -n "${{ inputs.version-notes }}" ]]; then
          NOTES="${{ inputs.version-notes }}"
        else
          NOTES="Automated submission for version ${{ steps.get_version.outputs.version }}"
        fi

        # Create source code archive for AMO review (required for listed submissions)
        echo "Creating source code archive..."
        git archive -o dist/source-code.zip HEAD

        # Submit to AMO listed channel (public distribution)
        web-ext sign --source-dir=src --artifacts-dir=dist-amo \
          --api-key="$AMO_API_KEY" --api-secret="$AMO_API_SECRET" \
          --channel=listed \
          --upload-source-code=dist/source-code.zip \
          --timeout=300000

        echo "Successfully submitted to AMO for review"
        echo "amo_submitted=true" >> $GITHUB_ENV

    - name: Firefox - Sign extension (unlisted/self-distribution)
      if: matrix.browser == 'firefox' && (steps.amo_config.outputs.submit == 'false' || steps.amo_config.outputs.channel == 'unlisted')
      env:
        AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
        AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
      run: |
        # Check if AMO credentials are configured
        if [[ -z "$AMO_API_KEY" || -z "$AMO_API_SECRET" ]]; then
          echo "AMO credentials not configured. Skipping signing."
          echo "Extension will be unsigned (requires Developer Edition or temporary installation)"
          exit 0
        fi

        echo "Firefox: Signing extension for self-distribution..."
        web-ext sign --source-dir=src --artifacts-dir=dist-signed \
          --api-key="$AMO_API_KEY" --api-secret="$AMO_API_SECRET" \
          --channel=unlisted \
          --timeout=300000

    - name: Firefox - Get build artifact
      if: matrix.browser == 'firefox'
      id: get_firefox_artifact
      run: |
        # Check for AMO submitted version, then signed version, then fall back to unsigned
        if [ "${{ env.amo_submitted }}" == "true" ] && [ -d "dist-amo" ] && [ "$(ls -A dist-amo/*.xpi 2>/dev/null)" ]; then
          filename=$(ls dist-amo/*.xpi | head -1 | xargs basename)
          filepath="dist-amo/$filename"
          echo "signed=amo" >> $GITHUB_OUTPUT
        elif [ -d "dist-signed" ] && [ "$(ls -A dist-signed/*.xpi 2>/dev/null)" ]; then
          filename=$(ls dist-signed/*.xpi | head -1 | xargs basename)
          filepath="dist-signed/$filename"
          echo "signed=true" >> $GITHUB_OUTPUT
        else
          filename=$(ls dist/*.zip | head -1 | xargs basename)
          filepath="dist/$filename"
          echo "signed=false" >> $GITHUB_OUTPUT
        fi
        echo "filename=$filename" >> $GITHUB_OUTPUT
        echo "filepath=$filepath" >> $GITHUB_OUTPUT
        echo "Found Firefox artifact: $filename (signed: $([ -d dist-signed ] && echo 'yes' || echo 'no'))"

    - name: Generate changelog
      id: changelog
      run: |
        CURRENT_VERSION="${{ steps.get_version.outputs.version_name }}"
        IS_PRERELEASE="${{ steps.release_type.outputs.is_prerelease }}"

        # Function to check if a tag is a pre-release
        is_prerelease_tag() {
          local tag=$1
          local version=${tag#v}
          if [[ "$version" =~ -(rc|beta|alpha)[0-9]*$ ]]; then
            return 0
          else
            return 1
          fi
        }

        # Get all tags sorted by version
        all_tags=$(git tag -l --sort=-version:refname)

        # Find the last stable release
        echo "Finding last stable release..."
        previous_stable=""
        for tag in $all_tags; do
          if [ "$IS_PRERELEASE" == "false" ] && [ "$tag" == "${{ github.ref_name }}" ]; then
            continue
          fi
          if ! is_prerelease_tag "$tag"; then
            previous_stable=$tag
            echo "Found last stable release: $previous_stable"
            break
          fi
        done

        # Generate the changelog
        if [ -n "$previous_stable" ]; then
          echo "Generating changelog from $previous_stable to HEAD..."
          echo "changelog<<EOF" >> $GITHUB_OUTPUT

          if [ "$IS_PRERELEASE" == "true" ]; then
            echo "### Changes in this pre-release (since stable $previous_stable)" >> $GITHUB_OUTPUT
          else
            echo "### Changes since $previous_stable" >> $GITHUB_OUTPUT
          fi

          commit_count=$(git rev-list --count $previous_stable..HEAD)
          echo "" >> $GITHUB_OUTPUT
          echo "_${commit_count} commits since last stable release_" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT

          git log --pretty=format:"- %s (%h)" $previous_stable..HEAD >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT

          echo "EOF" >> $GITHUB_OUTPUT
        else
          echo "No previous stable release found, generating initial release notes..."
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "## Initial Release" >> $GITHUB_OUTPUT
          echo "First official release of ${{ inputs.extension-display-name }}." >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Features" >> $GITHUB_OUTPUT
          git log --pretty=format:"- %s (%h)" --reverse >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        fi

    - name: Create Release with Asset (Firefox)
      if: matrix.browser == 'firefox' && (github.event_name == 'push' || inputs.create-release)
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        EXT_NAME="${{ inputs.extension-name }}"
        VERSION="${{ steps.get_version.outputs.version }}"
        SIGNED="${{ steps.get_firefox_artifact.outputs.signed }}"

        # Use appropriate source path and extension
        if [ "$SIGNED" == "amo" ]; then
          cp "${{ steps.get_firefox_artifact.outputs.filepath }}" "dist/${EXT_NAME}-firefox-v${VERSION}-amo.xpi"
          xpi_file="dist/${EXT_NAME}-firefox-v${VERSION}-amo.xpi"
        elif [ "$SIGNED" == "true" ]; then
          cp "${{ steps.get_firefox_artifact.outputs.filepath }}" "dist/${EXT_NAME}-firefox-v${VERSION}-signed.xpi"
          xpi_file="dist/${EXT_NAME}-firefox-v${VERSION}-signed.xpi"
        else
          mv "${{ steps.get_firefox_artifact.outputs.filepath }}" "dist/${EXT_NAME}-firefox-v${VERSION}.xpi"
          xpi_file="dist/${EXT_NAME}-firefox-v${VERSION}.xpi"
        fi

        # Create release notes file
        DISPLAY_NAME="${{ inputs.extension-display-name }}"
        DESCRIPTION="${{ inputs.extension-description }}"
        AMO_URL="${{ inputs.amo-url }}"

        cat > release_notes.md << NOTES_EOF
        # ${DISPLAY_NAME} v${VERSION}

        ${DESCRIPTION}

        ## Firefox Installation

        NOTES_EOF

        # Add appropriate installation instructions based on signing status
        if [ "$SIGNED" == "amo" ]; then
          {
            echo "**This release has been submitted to addons.mozilla.org for public distribution!**"
            echo ""
            echo "The extension will be available on AMO after review. In the meantime, you can:"
            echo "1. Download the \`.xpi\` file below under the **Assets** section for immediate installation"
            if [ -n "$AMO_URL" ]; then
              echo "2. Wait for it to appear on [the ${DISPLAY_NAME} page at addons.mozilla.org](${AMO_URL})"
            fi
            echo ""
          } >> release_notes.md
        elif [ "$SIGNED" == "true" ]; then
          cat >> release_notes.md << 'NOTES_EOF'
        **This release is signed by Mozilla and can be installed directly.**

        To install the extension:
        1. In the **Assets** section below, select the `.xpi` file.
        2. You should receive a Firefox prompt to add the extension; select "Continue to Installation"

        Alternatively, you can install the extension manually:
        1. Download the `.xpi` file link in the **Assets** section below
        2. Open the file with Firefox or drag it into a Firefox window
        3. Click "Add" when prompted

        NOTES_EOF
        else
          cat >> release_notes.md << 'NOTES_EOF'
        **This is an unsigned build. Installation options:**

        **Option 1: Firefox Developer Edition or Nightly**
        1. In Firefox Developer/Nightly, go to `about:config`
        2. Set `xpinstall.signatures.required` to `false`
        3. Download and install the `.xpi` file normally

        **Option 2: Temporary Installation (Regular Firefox)**
        1. Right-click the `.xpi` file link below and select "Save Link As" to download the extension (if you click the link, Firefox will try to install it which will be blocked because it's unsigned)
        2. Go to [about:debugging - "This Firefox"](about:debugging#/runtime/this-firefox)
        3. Click "Load Temporary Add-on..."
        4. Select the `.xpi` file you downloaded in Step 1

        NOTES_EOF
        fi

        # Add pre-release notice if applicable
        ISSUES_URL="${{ inputs.issues-url }}"
        if [ "${{ steps.release_type.outputs.is_prerelease }}" == "true" ]; then
          cat >> release_notes.md << NOTES_EOF

        ---

        **Pre-release Version**

        This is a pre-release version for testing new features.
        - May contain bugs or incomplete features
        - Will auto-update to stable version when released
        - Please report issues at ${ISSUES_URL}

        NOTES_EOF
        fi

        CHANGELOG="${{ steps.changelog.outputs.changelog }}"
        FF_MIN="${{ inputs.firefox-min-version }}"
        PERMISSIONS="${{ inputs.permissions-description }}"

        cat >> release_notes.md << NOTES_EOF

        ## What's New
        ${CHANGELOG}

        ---

        **Firefox Requirements:** Version ${FF_MIN}
        **Permissions:** ${PERMISSIONS}
        NOTES_EOF

        # Determine release flags based on type
        if [[ "${{ steps.release_type.outputs.is_prerelease }}" == "true" ]]; then
          RELEASE_FLAGS="--prerelease"
          RELEASE_TITLE="${DISPLAY_NAME} v${VERSION} (Pre-release)"
        else
          RELEASE_FLAGS=""
          RELEASE_TITLE="${DISPLAY_NAME} v${VERSION}"
        fi

        # Create release with asset using GitHub CLI
        if [[ "${{ github.event_name }}" == "push" ]]; then
          gh release create "${{ github.ref_name }}" \
            --title "$RELEASE_TITLE" \
            --notes-file release_notes.md \
            $RELEASE_FLAGS \
            "$xpi_file"
        else
          gh release create "v${VERSION}-manual-$(date +%Y%m%d%H%M%S)" \
            --title "$RELEASE_TITLE (Manual Build)" \
            --notes-file release_notes.md \
            --prerelease \
            "$xpi_file"
        fi

    - name: Build Summary
      run: |
        EXT_NAME="${{ inputs.extension-name }}"
        VERSION="${{ steps.get_version.outputs.version }}"
        SIGNED="${{ steps.get_firefox_artifact.outputs.signed }}"

        echo "${{ matrix.browser }} build completed for v${VERSION}!"
        if [ "${{ matrix.browser }}" == "firefox" ]; then
          if [ "$SIGNED" == "amo" ]; then
            echo "Firefox Asset: ${EXT_NAME}-firefox-v${VERSION}-amo.xpi (Submitted to AMO)"
            echo "AMO Status: Submitted for review on addons.mozilla.org"
          elif [ "$SIGNED" == "true" ]; then
            echo "Firefox Asset: ${EXT_NAME}-firefox-v${VERSION}-signed.xpi (SIGNED for self-distribution)"
          else
            echo "Firefox Asset: ${EXT_NAME}-firefox-v${VERSION}.xpi (unsigned)"
          fi
          if [[ "${{ github.event_name }}" == "push" || "${{ inputs.create-release }}" == "true" ]]; then
            echo "Release URL: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          else
            echo "Build artifacts available in workflow run"
          fi
        fi

    - name: Upload artifacts (manual builds)
      if: github.event_name == 'workflow_dispatch' && !inputs.create-release
      uses: actions/upload-artifact@v4
      with:
        name: firefox-extension-v${{ steps.get_version.outputs.version }}
        path: |
          dist/*.zip
          dist/*.xpi
          dist-signed/*.xpi
          dist-amo/*.xpi
        retention-days: 30
